name: ParentLink CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run tests
      run: npm test
      env:
        FIREBASE_PRIVATE_KEY_ID: ${{ secrets.FIREBASE_PRIVATE_KEY_ID }}
        FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
        FIREBASE_CLIENT_ID: ${{ secrets.FIREBASE_CLIENT_ID }}
    
    - name: Build application
      run: npm run build
    
    - name: Deploy to Firebase
      if: github.ref == 'refs/heads/main' && (env.FIREBASE_TOKEN != '' || env.FIREBASE_CLIENT_EMAIL != '')
      run: |
        if [ -n "$FIREBASE_TOKEN" ]; then
          npx firebase-tools@latest deploy --project parentlink-2024-app --token "$FIREBASE_TOKEN"
        else
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-service-account.json"
          node -e "const fs=require('fs'); const email=process.env.FIREBASE_CLIENT_EMAIL||''; const credentials={type:'service_account',project_id:'parentlink-2024-app',private_key_id:process.env.FIREBASE_PRIVATE_KEY_ID,private_key:(process.env.FIREBASE_PRIVATE_KEY||'').replace(/\\\\n/g,'\\n'),client_email:email,client_id:process.env.FIREBASE_CLIENT_ID,auth_uri:'https://accounts.google.com/o/oauth2/auth',token_uri:'https://oauth2.googleapis.com/token',auth_provider_x509_cert_url:'https://www.googleapis.com/oauth2/v1/certs',client_x509_cert_url:'https://www.googleapis.com/robot/v1/metadata/x509/'+encodeURIComponent(email),universe_domain:'googleapis.com'}; fs.writeFileSync(process.env.GOOGLE_APPLICATION_CREDENTIALS, JSON.stringify(credentials));"
          npx firebase-tools@latest deploy --project parentlink-2024-app
        fi
      env:
        FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        FIREBASE_PRIVATE_KEY_ID: ${{ secrets.FIREBASE_PRIVATE_KEY_ID }}
        FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
        FIREBASE_CLIENT_ID: ${{ secrets.FIREBASE_CLIENT_ID }}
